<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Cache Web Clipper</title>
        <link rel="stylesheet" href="popup.css">
    </head>
    <body>
        <main class="panel">
            <section class="section" aria-labelledby="manual-sync-heading">
                <h1 id="manual-sync-heading" class="section-title">
                    Import anything into your Cache
                </h1>
                <button type="button" id="sync" class="btn">Import page</button>
            </section>
            <section class="section" aria-labelledby="chrome-sync-heading">
                <div class="section-row">
                    <h2 id="chrome-sync-heading" class="section-title">
                        Browser bookmarks
                    </h2>
                    <label class="switch">
                        <input type="checkbox" id="chromeContinuous">
                        <span>Continuous sync</span>
                    </label>
                </div>
                <button type="button" id="chromeSync" class="btn">
                    Import bookmarks
                </button>
            </section>
            <button type="button" id="openCache" class="btn btn-secondary">
                Open Cache
            </button>
            <p id="status" class="status" role="status"></p>
        </main>
        <script src="cache-config.js"></script>
        <script src="cache-extension-runtime.js"></script>
        <script src="popup.js"></script>
    </body>
</html>
